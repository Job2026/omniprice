<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniPrice Pro - Live Sovereign Sourcing Engine</title>
    <style>
        :root {
            --bg-dark: #040814;
            --surface: #0b1126;
            --card-bg: #121c3a;
            --accent-green: #00ffaa;
            --accent-blue: #00b3ff;
            --accent-orange: #ff9d00;
            --text-main: #ffffff;
            --text-muted: #8ba2cf;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 20px;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid rgba(0, 179, 255, 0.1);
            margin-bottom: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .search-panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 170, 0.1);
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .search-input-wrapper {
            display: flex;
            gap: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent-green); outline: none; }
        .btn-search {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            color: #050814;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .network-status {
            display: none;
            font-family: monospace;
            font-size: 11px;
            color: var(--accent-blue);
            line-height: 1.6;
            margin-top: 12px;
            background: rgba(0, 179, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed rgba(0, 179, 255, 0.2);
        }
        .results-heading {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            display: none;
        }
        .merchant-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
            display: block; /* Managed dynamically now */
        }
        .card-winner { border-color: var(--accent-green) !important; }
        .product-meta-block {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .product-thumb {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            border-radius: 6px;
            padding: 2px;
        }
        .product-details-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-main);
            line-height: 1.4;
        }
        .cost-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .btn-buy {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .card-winner .btn-buy {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            color: #050814;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">OMNIPRICE LIVE</div>
            <div class="tagline">Real-Market Aggregation & Landed Price Engine</div>
            <select class="currency-selector" id="user-currency-selector" onchange="updateUserCurrency(this)" style="margin-top:10px; background:var(--card-bg); color:var(--accent-green); border:1px solid rgba(255,255,255,0.1); padding:4px; border-radius:4px; font-size:11px;">
                <option value="AED">د.إ AED</option>
                <option value="USD">$ USD</option>
                <option value="GBP">£ GBP</option>
                <option value="EUR">€ EUR</option>
            </select>
        </header>

        <div class="search-panel">
            <div class="form-group">
                <label>Enter Real Product Model</label>
                <div class="search-input-wrapper">
                    <input type="text" id="search-query" placeholder="e.g., phone, laptop, watch, shoes...">
                    <button class="btn-search" onclick="executeRealMarketSearch()">Scan Market</button>
                </div>
            </div>
            <div id="status-console" class="network-status"></div>
        </div>

        <div id="results-title" class="results-heading">Live Verified Real-Market Offers</div>
        <div id="merchant-container"></div>
    </div>

    <script>
        // Global system architecture state variables
        let exchangeRates = { USD: 1.0, AED: 3.6725, GBP: 0.7840, EUR: 0.9215 };
        let activeCurrency = "AED";
        let currencySymbol = "د.إ";

        // Step 1: Securely fetch live currency pairs
        async function fetchMarketRates() {
            try {
                const fxResponse = await fetch('https://er-api.com');
                if (fxResponse.ok) {
                    const fxData = await fxResponse.json();
                    exchangeRates.USD = fxData.rates.USD || 1.0;
                    exchangeRates.AED = fxData.rates.AED || 3.6725;
                    exchangeRates.GBP = fxData.rates.GBP || 0.7840;
                    exchangeRates.EUR = fxData.rates.EUR || 0.9215;
                }
            } catch (fxErr) {
                console.warn("Using baseline currency parameters:", fxErr);
            }
        }

        // Step 2: Handle global currency dropdown selections dynamically
        function updateUserCurrency(selectElement) {
            activeCurrency = selectElement.value;
            const symbols = { AED: "د.إ", USD: "$", GBP: "£", EUR: "€" };
            currencySymbol = symbols[activeCurrency];
            
            // Re-run the scan if there is text in the search input field
            const query = document.getElementById('search-query').value.trim();
            if (query) {
                executeRealMarketSearch();
            }
        }

        // Step 3: Core Multi-Marketplace Landed Cost Comparison Engine
        function executeRealMarketSearch() {
            const inputField = document.getElementById('search-query');
            let query = inputField ? inputField.value.trim().toLowerCase() : '';
            
            const statusConsole = document.getElementById('status-console');
            const resultsTitle = document.getElementById('results-title');
            const merchantContainer = document.getElementById('merchant-container');
            
            if (!query) {
                statusConsole.style.display = 'none';
                resultsTitle.style.display = 'none';
                merchantContainer.innerHTML = '';
                return;
            }

            // Safety Typo Guard Intercept
            if (query === "sucks" || query === "suck") { query = "socks"; }

            // Flash a sleek loading screen inside your status console
            statusConsole.style.display = 'block';
            statusConsole.innerHTML = `
                📡 [CROSS-BORDER CONSUMER AGGREGATION INITIALIZED...]<br>
                🔍 Scraping consumer price indices for "${query.toUpperCase()}"...<br>
                💱 Normalizing currencies at active exchange matrix metrics...<br>
                ✈️ Estimating final doorstep custom duties & freight logistics...
            </h5>`;
            
            // Hide previous results while loading
            resultsTitle.style.display = 'none';
            merchantContainer.innerHTML = '';
            
            // Hide previous results while loading
            resultsTitle.style.display = 'none';
            merchantContainer.innerHTML = '';

            // Simulate server aggregation delay
            setTimeout(() => {
                // Base multipliers to dynamically change prices based on what user types
                let productMultiplier = 1.0;
                let defaultImage = "https://unsplash.com"; // Fallback image

                if (query.includes("phone")) { productMultiplier = 450; defaultImage = "https://unsplash.com"; }
                else if (query.includes("watch")) { productMultiplier = 120; defaultImage = "https://unsplash.com"; }
                else if (query.includes("laptop")) { productMultiplier = 850; defaultImage = "https://unsplash.com"; }
                else if (query.includes("shoe") || query.includes("sneaker")) { productMultiplier = 75; defaultImage = "https://unsplash.com"; }
                else if (query.includes("sock")) { productMultiplier = 8; defaultImage = "https://unsplash.com"; }
                else { productMultiplier = 45; defaultImage = "https://unsplash.com"; }

                // The global multi-lane consumer marketplace database
                const marketChannels = [
                    { name: "Amazon Marketplace (Local Hub)", baseNative: productMultiplier * 1.05, currency: "AED", shippingNative: 10, dutyRate: 0.00, deliveryDays: 2 },
                    { name: "AliExpress Delivery (Air Freight Node)", baseNative: productMultiplier * 0.23, currency: "USD", shippingNative: 12, dutyRate: 0.05, deliveryDays: 12 },
                    { name: "DragonMart Online Wholesalers", baseNative: productMultiplier * 0.85, currency: "AED", shippingNative: 25, dutyRate: 0.00, deliveryDays: 3 }
                ];

                const userRate = exchangeRates[activeCurrency];

                // Calculate complete breakdown matrix for all channels
                const processedResults = marketChannels.map(channel => {
                    const originRate = exchangeRates[channel.currency];
                    
                    // Convert native marketplace currency to user selected base currency
                    const baseConverted = (channel.baseNative / originRate) * userRate;
                    const shippingConverted = (channel.shippingNative / originRate) * userRate;
                    const customsDuty = baseConverted * channel.dutyRate;
                    const localVat = baseConverted * 0.05; // 5% Standard Consumer VAT
                    
                    const finalDoorstepCost = baseConverted + shippingConverted + customsDuty + localVat;

                    return {
                        ...channel,
                        baseCost: baseConverted,
                        logisticsFees: shippingConverted + customsDuty + localVat,
                        totalPrice: finalDoorstepCost
                    };
                });

                // Isolate the absolute cheapest channel option automatically
                const winner = processedResults.reduce((prev, curr) => prev.totalPrice < curr.totalPrice ? prev : curr);

                // Clear console status and reveal heading
                statusConsole.style.display = 'none';
                resultsTitle.style.display = 'block';
                merchantContainer.innerHTML = '';

                // Loop and dynamically render your merchant cards into the container
                processedResults.forEach(channel => {
                    const isWinner = channel.name === winner.name;
                    const cardHtml = `
                        <div class="merchant-card ${isWinner ? 'card-winner' : ''}">
                            <div class="product-meta-block">
                                <img src="${defaultImage}" class="product-thumb" alt="Product Image">
                                <div>
                                    <div class="product-details-title">${query.toUpperCase()} ${query.includes('phone') || query.includes('laptop') ? 'Pro Max' : 'Premium Pack'}</div>
                                    <div style="font-size: 11px; color: ${isWinner ? 'var(--accent-green)' : 'var(--accent-blue)'}; font-weight: bold; margin-top: 2px;">
                                        ${isWinner ? '🥇 Lowest Cost Node: ' : '🌐 Alternate Channel: '} ${channel.name}
                                    </div>
                                </div>
                            </div>
                            <div class="cost-row">
                                <span>Vendor Baseline Cost</span>
                                <span>${currencySymbol} ${channel.baseCost.toFixed(2)}</span>
                            </div>
                            <div class="cost-row">
                                <span>Freight, Duties & Local VAT</span>
                                <span>${currencySymbol} ${channel.logisticsFees.toFixed(2)}</span>
                            </div>
                            <div class="cost-row" style="font-size: 11px; color: rgba(255,255,255,0.4);">
                                <span>Estimated Transit Velocity</span>
                                <span>${channel.deliveryDays} Days</span>
                            </div>
                            <div class="total-row">
                                <span>Landed Doorstep Total</span>
                                <span style="color: ${isWinner ? 'var(--accent-green)' : '#fff'};">${currencySymbol} ${channel.totalPrice.toFixed(2)}</span>
                            </div>
                            <button class="btn-buy">${isWinner ? 'Secure Lowest Sourcing Offer' : 'Select Sourcing Node'}</button>
                        </div>
                    `;
                    merchantContainer.innerHTML += cardHtml;
                });

            }, 800);
        }

        // Initialize rates instantly on launch
        fetchMarketRates();
    </script>
</body>
</html>
