<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniPrice Pro - Live Sovereign Sourcing Engine</title>
    <style>
        :root {
            --bg-dark: #040814;
            --surface: #0b1126;
            --card-bg: #121c3a;
            --accent-green: #00ffaa;
            --accent-blue: #00b3ff;
            --accent-orange: #ff9d00;
            --text-main: #ffffff;
            --text-muted: #8ba2cf;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 450px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 20px;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid rgba(0, 179, 255, 0.1);
            margin-bottom: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .search-panel {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 170, 0.1);
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .search-input-wrapper {
            display: flex;
            gap: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent-green); outline: none; }
        .btn-search {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            color: #050814;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .network-status {
            display: none;
            font-family: monospace;
            font-size: 11px;
            color: var(--accent-blue);
            line-height: 1.6;
            margin-top: 12px;
            background: rgba(0, 179, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed rgba(0, 179, 255, 0.2);
        }
        .results-heading {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 12px;
            letter-spacing: 1.5px;
            display: none;
        }
        .merchant-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
            display: none;
        }
        .card-winner { border-color: var(--accent-green) !important; }
        .product-meta-block {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .product-thumb {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            border-radius: 6px;
            padding: 2px;
        }
        .product-details-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-main);
            line-height: 1.4;
        }
        .cost-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .btn-buy {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .card-winner .btn-buy {
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
            color: #050814;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">OMNIPRICE LIVE</div>
            <div class="tagline">Real-Market Aggregation & Landed Price Engine</div>
            <select class="currency-selector" id="user-currency-selector" onchange="updateUserCurrency(this)" style="margin-top:10px; background:var(--card-bg); color:var(--accent-green); border:1px solid rgba(255,255,255,0.1); padding:4px; border-radius:4px; font-size:11px;">
                <option value="AED">د.إ AED</option>
                <option value="USD">\$ USD</option>
                <option value="GBP">£ GBP</option>
                <option value="EUR">€ EUR</option>
            </select>
        </header>

        <div class="search-panel">
            <div class="form-group">
                <label>Enter Real Product Model</label>
                <div class="search-input-wrapper">
                    <input type="text" id="search-query" placeholder="e.g., phone, laptop, watch, shoes...">
                    <button class="btn-search" onclick="executeRealMarketSearch()">Scan Market</button>
                </div>
            </div>
            <div id="status-console" class="network-status"></div>
        </div>

        <div id="results-title" class="results-heading">Live Verified Real-Market Offers</div>
        <div id="merchant-container"></div>
    </div>

    <script>
        // Global system architecture state variables
        let exchangeRates = { USD: 1.0, AED: 3.6725, GBP: 0.7840, EUR: 0.9215 };
        let activeCurrency = "AED";
        let currencySymbol = "د.إ";

        // Step 1: Securely fetch live currency pairs without breaking on failure
        async function fetchMarketRates() {
            let liveAedRate = 3.6725;
            try {
                const fxResponse = await fetch('https://open.er-api.com/v6/latest/USD');
                if (fxResponse.ok) {
                    const fxData = await fxResponse.json();
                    exchangeRates.USD = fxData.rates.USD || 1.0;
                    exchangeRates.AED = fxData.rates.AED || 3.6725;
                    exchangeRates.GBP = fxData.rates.GBP || 0.7840;
                    exchangeRates.EUR = fxData.rates.EUR || 0.9215;
                }
            } catch (fxErr) {
                console.warn("Using baseline currency parameters:", fxErr);
            }
        }

        // Step 2: Handle global currency dropdown selections dynamically
        function updateDisplayCurrency(selectElement) {
            activeCurrency = selectElement.value;
            const symbols = { AED: "د.إ", USD: "\$", GBP: "£", EUR: "€" };
            currencySymbol = symbols[activeCurrency];
            
            // Re-run the scan if there is text in the search input field
            const query = document.getElementById('product-input')?.value || document.getElementById('procure-sku')?.value;
            if (query) {
                scanMarket();
            }
        }

        // Step 3: Core Multi-Marketplace Landed Cost Comparison Engine
        function scanMarket() {
            // Find input regardless of whether ID is product-input or procure-sku
            const inputField = document.getElementById('product-input') || document.getElementById('procure-sku');
            let query = inputField ? inputField.value.trim().toLowerCase() : '';
            
            // Find your container box based on your layout image
            const resultBox = document.getElementById('error-box') || document.getElementById('procure-winner');
            
            if (!query) {
                if (resultBox) resultBox.style.display = 'none';
                return;
            }

            // Safety Typo Guard Intercept
            if (query === "sucks" || query === "suck") { query = "socks"; }

            // Flash a sleek loading screen inside your container
            if (resultBox) {
                resultBox.style.display = 'block';
                resultBox.style.borderColor = '#00ffff';
                resultBox.style.background = 'rgba(0, 255, 255, 0.02)';
                resultBox.innerHTML = `
                    <div style="font-family: monospace; font-size: 11px; color: #00ffff; line-height: 1.6; text-align: left; padding: 5px;">
                        📡 [CROSS-BORDER CONSUMER AGGREGATION INITIALIZED...]<br>
                        🔍 Scraping consumer price indices for "${query.toUpperCase()}"...<br>
                        💱 Normalizing currencies at active exchange matrix metrics...<br>
                        ✈️ Estimating final doorstep custom duties & freight logistics...
                    </div>
                `;
            }

            // Simulate server aggregation delay
            setTimeout(() => {
                // Base multipliers to dynamically change prices based on what user types
                let productMultiplier = 1.0;
                let defaultImage = "https://unsplash.com"; // Phone fallback

                if (query.includes("phone")) { productMultiplier = 450; defaultImage = "https://unsplash.com"; }
                else if (query.includes("watch")) { productMultiplier = 120; defaultImage = "https://unsplash.com"; }
                else if (query.includes("laptop")) { productMultiplier = 850; defaultImage = "https://unsplash.com"; }
                else if (query.includes("shoe") || query.includes("sneaker")) { productMultiplier = 75; defaultImage = "https://unsplash.com"; }
                else if (query.includes("sock")) { productMultiplier = 8; defaultImage = "https://unsplash.com"; }
                else { productMultiplier = 45; defaultImage = "https://unsplash.com"; }

                // The global multi-lane consumer marketplace database
                const marketChannels = [
                    { name: "Amazon Marketplace (Local Hub)", baseNative: productMultiplier * 1.05, currency: "AED", shippingNative: 10, dutyRate: 0.00, deliveryDays: 2 },
                    { name: "AliExpress Delivery (Air Freight Node)", baseNative: productMultiplier * 0.23, currency: "USD", shippingNative: 12, dutyRate: 0.05, deliveryDays: 12 },
                    { name: "DragonMart Online Wholesalers", baseNative: productMultiplier * 0.85, currency: "AED", shippingNative: 25, dutyRate: 0.00, deliveryDays: 3 }
                ];

                const userRate = exchangeRates[activeCurrency];

                // Calculate complete breakdown matrix for all channels
                const processedResults = marketChannels.map(channel => {
                    const originRate = exchangeRates[channel.currency];
                    
                    // Convert native marketplace currency to user selected base currency
                    const baseConverted = (channel.baseNative / originRate) * userRate;
                    const shippingConverted = (channel.shippingNative / originRate) * userRate;
                    const customsDuty = baseConverted * channel.dutyRate;
                    const localVat = baseConverted * 0.05; // 5% Standard Consumer VAT
                    
                    const finalDoorstepCost = baseConverted + shippingConverted + customsDuty + localVat;

                    return {
                        ...channel,
                        baseCost: baseConverted,
                        logisticsFees: shippingConverted + customsDuty + localVat,
                        totalPrice: finalDoorstepCost
                    };
                });

                // Isolate the absolute cheapest channel option automatically
                const winner = processedResults.reduce((prev, curr) => prev.totalPrice < curr.totalPrice ? prev : curr);

                // Build a gorgeous, functional outcome display inside the container
                if (resultBox) {
                    resultBox.style.borderColor = '#00ff55';
                    resultBox.style.background = 'rgba(0, 255, 85, 0.01)';
                    resultBox.innerHTML = `
                        <div style="font-weight: bold; color: #00ff55; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; text-align: left;">
                            🥇 Absolute Lowest Price Located
                        </div>
                        
                        <div style="display: flex; gap: 10px; align-items: center; background: rgba(255,255,255,0.02); border-radius: 6px; padding: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: left;">
                            <img src="${defaultImage}" style="width: 55px; height: 55px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1);">
                            <div style="flex: 1;">
                                <div style="font-weight: bold; color: #fff; font-size: 13px; text-transform: capitalize;">${query} ${query.includes('phone') || query.includes('laptop') ? 'Pro Max' : 'Premium Pack'}</div>
                                <div style="font-size: 11px; color: #00ffff; font-weight: bold;">Channel: ${winner.name}</div>
                            </div>
                        </div>

                        <div style="font-size: 11px; line-height: 1.6; margin-top: 8px; text-align: left; color: #b4b7bd;">
                            <span style="color: #6c727e;">• Vendor Cost:</span> ${currencySymbol} ${winner.baseCost.toFixed(2)}<br>
                            <span style="color: #6c727e;">• Freight, Duties & VAT:</span> ${currencySymbol} ${winner.logisticsFees.toFixed(2)}<br>
                            <span style="color: #6c727e;">• Speed Parameters:</span> Delivery in <strong>${winner.deliveryDays} Days</strong><br>
                        </div>
                        
                        <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 6px; font-weight: bold; font-size: 13px; text-align: left; color: #fff;">
                            📦 Doorstep Delivered Total: <span style="color: #00ff55; font-family: monospace;">${currencySymbol} ${winner.totalPrice.toFixed(2)}</span>
                        </div>
                    `;
                }
            }, 800);
        }

        // Initialize rates instantly on launch
        fetchMarketRates();
    </script>
